name: sycebnl_accounting
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.7.0


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # SQLite pour la base de données locale
  sqflite_common_ffi: ^2.3.0+4
  path: ^1.9.0
  path_provider: ^2.1.1
  crypto: ^3.0.3
  file_picker: ^8.0.0+1

  # Window management for desktop
  window_manager: ^0.4.3

  # PDF generation
  pdf: ^3.10.6
  excel: ^4.0.6

  # Sécurité du dossier comptable (Argon2id, AES-256-GCM, X25519)
  cryptography: ^2.7.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Génération de l'icône Windows à partir du logo officiel :
  # `dart run flutter_launcher_icons` (à relancer si le PNG est remplacé)
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: "assets/images/icone.png"
  windows:
    generate: true
    image_path: "assets/images/icone.png"
    icon_size: 256

flutter:


  uses-material-design: true


  assets:
    - "lib/utils/PLAN_SYCEBNL Excel_Version actualise.xlsx"
    - "assets/images/logo.png"
    - "assets/images/icone.png"

